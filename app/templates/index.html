<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Loan Eligibility Predictor</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background: linear-gradient(135deg,#1a73e8,#6a11cb,#2575fc);
background-size:400% 400%;
animation: gradient 12s ease infinite;

}

@keyframes gradient{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

.card{

width:520px;
padding:40px;
border-radius:18px;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);

box-shadow:0 20px 40px rgba(0,0,0,0.2);

color:white;

}

h1{

text-align:center;
margin-bottom:25px;
font-size:28px;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.form-group{

display:flex;
flex-direction:column;

}

label{

font-size:13px;
margin-bottom:4px;

}

input,select{

padding:9px;
border:none;
border-radius:8px;
font-size:14px;

}

.full{

grid-column: span 2;

}

button{

margin-top:20px;
width:100%;
padding:13px;
border:none;
border-radius:10px;

background:white;
color:#1a73e8;

font-size:16px;
font-weight:bold;

cursor:pointer;
transition:0.3s;

}

button:hover{

transform:scale(1.03);
background:#e8f0ff;

}

.result{

margin-top:20px;
padding:12px;
border-radius:10px;

font-size:18px;
text-align:center;
font-weight:bold;

}

.approved{

background:#27ae60;

}

.rejected{

background:#e74c3c;

}

.footer{

text-align:center;
margin-top:12px;
font-size:12px;
opacity:0.8;

}

</style>

</head>

<body>

<div class="card">

<h1><i class="fa-solid fa-robot"></i> AI Loan Predictor</h1>

<form action="/predict" method="post">

<div class="grid">

<div class="form-group">
<label>Gender</label>
<select name="Gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="form-group">
<label>Married</label>
<select name="Married">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Dependents</label>
<select name="Dependents">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3+">3+</option>
</select>
</div>

<div class="form-group">
<label>Education</label>
<select name="Education">
<option value="Graduate">Graduate</option>
<option value="Not Graduate">Not Graduate</option>
</select>
</div>

<div class="form-group">
<label>Self Employed</label>
<select name="Self_Employed">
<option value="No">No</option>
<option value="Yes">Yes</option>
</select>
</div>

<div class="form-group">
<label>Credit History</label>
<select name="Credit_History">
<option value="1.0">Good</option>
<option value="0.0">Poor</option>
</select>
</div>

<div class="form-group">
<label>Applicant Income</label>
<input type="number" name="ApplicantIncome">
</div>

<div class="form-group">
<label>Co-Applicant Income</label>
<input type="number" name="CoapplicantIncome">
</div>

<div class="form-group">
<label>Loan Amount</label>
<input type="number" name="LoanAmount">
</div>

<div class="form-group">
<label>Loan Term</label>
<input type="number" name="Loan_Amount_Term" value="360">
</div>

<div class="form-group full">
<label>Property Area</label>
<select name="Property_Area">
<option value="Urban">Urban</option>
<option value="Semiurban">Semiurban</option>
<option value="Rural">Rural</option>
</select>
</div>

</div>

<button type="submit">
<i class="fa-solid fa-magnifying-glass"></i> Check Eligibility
</button>

</form>

{% if prediction_text %}

<div class="result {% if 'Approved' in prediction_text %}approved{% else %}rejected{% endif %}">
{{ prediction_text }}
</div>

{% endif %}

<div class="footer">
Machine Learning Project | KNN Loan Risk Model
</div>

</div>

</body>
</html>
